{% extends "sons/base.html" %}
{% block extra_head %}
<style>
    form > p {
        display: flex;
        flex-wrap: wrap;
    }
    label { width: 8em; }
    body { background-color: #eee; }
    input {
        padding: .5em;
        height: 2em;
    }
    main {
        overflow: hidden;
        width: 480px;
        margin: 1em auto;
        border: 1px solid #aaa;
        border-radius: 1em;
        background-color: white;
        padding: 0;
        color: #333;
    }
    .account { margin: 1em; }
    .helptext {
        font-style: italic;
        margin-left: 8em;
    }
    main > h1 {
        padding: .5em;
        background-color: #002664;
        color: white;
        margin-top: 0;
        text-align: center;
        font-size: 1.5em;
    }
    .submit {  }
    .submit > .btn {
        padding: .5em;
    }
    .norway {
        background-color: #ed2939;
        background-image: linear-gradient(180deg, transparent, transparent 18px, #002664 18px, #002664 22px, transparent 22px, transparent 100%), linear-gradient(90deg, transparent, transparent 16px, #002664 16px, #002664 20px, transparent 20px, transparent 100%), linear-gradient(180deg, transparent, transparent 16px, #FFF 16px, #FFF 24px, transparent 24px, transparent 100%), linear-gradient(90deg, transparent, transparent 14px, #FFF 14px, #FFF 22px, transparent 22px, transparent 100%);
        height: 40px;
        width: 100%;
    }

</style>
{% endblock extra_head %}
{% block main_content %}
<main>
    <h1>{% block account_heading %}{% endblock %}</h1>
    <div class="account">
        {% block account_content %}{% endblock %}
    </div>
    <div class="norway"></div>
</main>
{% endblock main_content %}
